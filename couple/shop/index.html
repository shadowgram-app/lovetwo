<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커플 리포트 구매 — 42world</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#0F121E; --card:#1A2030; --gold:#B8860B; --gold-l:#D4A017; --silver:#8899AA; --text:#E8E4DC; --border:rgba(184,134,11,0.2); }
body { font-family:'Apple SD Gothic Neo','Malgun Gothic','Montserrat','Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* NAV */
.nav { display:flex; align-items:center; padding:0 20px; height:52px; background:rgba(15,18,30,0.97); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:99; }
.nav a { color:var(--gold-l); font-weight:900; font-size:17px; text-decoration:none; letter-spacing:1px; }
.nav a span.dim { color:#A0A8B8; font-weight:300; }

.wrap { max-width:560px; margin:0 auto; padding:36px 20px 80px; }
.badge { display:inline-block; background:rgba(184,134,11,0.12); border:1px solid var(--border); color:var(--gold-l); font-size:11px; font-weight:700; letter-spacing:2px; padding:5px 14px; border-radius:20px; margin-bottom:16px; }
.shop-title { font-size:26px; font-weight:900; color:#fff; margin-bottom:8px; }
.shop-sub { font-size:14px; color:var(--silver); line-height:1.7; margin-bottom:28px; }

/* 상품 카드 공통 */
.product-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px 20px; margin-bottom:12px; cursor:pointer; transition:border-color .2s, background .2s; }
.product-card:hover { border-color:var(--gold-l); background:#1F2840; }
.product-card.selected { border-color:var(--gold-l); background:#1F2840; box-shadow:0 0 0 2px rgba(184,134,11,0.25); }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.card-combo { font-size:13px; font-weight:900; color:#fff; letter-spacing:.5px; }
.card-label { font-size:11px; color:var(--silver); font-weight:400; }
.card-desc { font-size:12px; color:var(--silver); line-height:1.6; margin-top:4px; }
.card-price { font-size:18px; font-weight:900; color:var(--gold-l); margin-top:8px; }
.card-orig { font-size:12px; color:var(--silver); text-decoration:line-through; margin-right:6px; }

/* 필터 탭 */
.filter-wrap { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.filter-btn { padding:6px 14px; border-radius:20px; border:1px solid rgba(136,153,170,0.25); background:transparent; color:var(--silver); font-size:12px; font-family:inherit; cursor:pointer; transition:all .15s; }
.filter-btn.active, .filter-btn:hover { background:var(--gold-l); color:#0F121E; border-color:var(--gold-l); font-weight:700; }

/* 검색 */
.search-wrap { margin-bottom:20px; }
.search-wrap input { width:100%; padding:11px 16px; border-radius:12px; border:1px solid rgba(136,153,170,0.2); background:#1A2030; color:var(--text); font-size:13px; font-family:inherit; outline:none; }
.search-wrap input:focus { border-color:var(--gold-l); }
.search-wrap input::placeholder { color:var(--silver); }

/* 선택 구매 바 */
.buy-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(15,18,30,0.98); border-top:1px solid var(--border); padding:16px 20px; z-index:200; display:none; }
.buy-bar.show { display:block; }
.buy-bar-inner { max-width:560px; margin:0 auto; display:flex; align-items:center; gap:12px; }
.buy-bar-text { flex:1; font-size:13px; color:var(--silver); }
.buy-bar-text strong { color:#fff; }
.btn-buy { padding:14px 28px; background:linear-gradient(135deg,#B8860B,#D4A017); border:none; border-radius:12px; color:#0F121E; font-size:15px; font-weight:900; cursor:pointer; transition:opacity .2s; white-space:nowrap; font-family:inherit; }
.btn-buy:hover { opacity:.85; }
.btn-buy-full { width:100%; padding:17px; background:linear-gradient(135deg,#B8860B,#D4A017); border:none; border-radius:13px; color:#0F121E; font-size:16px; font-weight:900; cursor:pointer; transition:opacity .2s; margin-top:20px; font-family:inherit; }
.btn-buy-full:hover { opacity:.85; }

.notice { background:rgba(136,153,170,0.06); border:1px solid rgba(136,153,170,0.15); border-radius:12px; padding:16px 18px; margin-top:20px; font-size:13px; color:var(--silver); line-height:1.7; }
.count-text { font-size:13px; color:var(--silver); margin-bottom:12px; }
.count-text span { color:var(--gold-l); font-weight:700; }

/* 결과 없음 */
.empty { text-align:center; padding:40px 0; color:var(--silver); font-size:14px; }

footer { border-top:1px solid var(--border); padding:28px 20px; text-align:center; margin-top:40px; }
.footer-links { display:flex; justify-content:center; flex-wrap:wrap; gap:14px; margin-bottom:12px; }
.footer-links a { font-size:12px; color:var(--silver); text-decoration:none; }
.footer-links a:hover { color:var(--gold-l); }
.footer-biz { font-size:11px; color:rgba(136,153,170,0.5); line-height:1.8; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/"><span class="dim">42</span>WORLD <span style="color:rgba(184,134,11,0.5);font-weight:300;font-size:13px;"> · </span><span style="color:#8899AA;font-weight:400;font-size:10px;letter-spacing:2px;">COUPLE</span></a>
</nav>

<div class="wrap">
  <div class="badge">COUPLE REPORT</div>

  <div id="product-list"></div>

  <div class="notice">
    결제 후 다운로드 링크가 이메일로 발송됩니다.<br>
    문의: lovetwo.app | 환불은 <a href="/legal/refund.html" style="color:var(--gold-l)">환불정책</a>을 확인해 주세요.

</div>

<div class="buy-bar" id="buy-bar">
  <div class="buy-bar-inner">
    <div class="buy-bar-text" id="buy-bar-text">선택된 상품이 없습니다</div>
    <button class="btn-buy" onclick="handleBuy()">카카오페이 결제 →</button>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="/legal/terms.html">이용약관</a>
    <a href="/legal/privacy.html">개인정보처리방침</a>

  <div class="footer-biz">

  'PLAYER×SOUL':'활동적인 외면과 깊은 내면이 서로를 궁금하게 만드는 커플.',

  'HARMONY×PLAYER':'HARMONY의 따뜻함이 PLAYER의 에너지를 포근히 감싸줘요.',
  'HARMONY×HARMONY':'서로를 깊이 배려하는 두 사람. 갈등보다 화합을 선택해요.',
  'HARMONY×SOUL':'두 감성 유형이 만나 세상에서 가장 감성적인 커플이 됩니다.',

  'SOUL×STEADY':'SOUL의 감수성을 STEADY가 묵묵히 지지해주는 안정적인 관계.',
  'SOUL×PLAYER':'조용한 심연과 밝은 에너지의 신기한 조화. 서로를 성장시켜요.',
  'SOUL×HARMONY':'깊은 감수성이 두 배가 되는 조합. 서로의 마음을 잘 읽어요.',
  'SOUL×SOUL':'둘 다 깊이 느끼고 깊이 사랑해요. 강렬하고 진한 관계.',
  'SOUL×LOGIC':'감성과 논리가 충돌하기도 하지만, 서로를 통해 균형을 찾아요.',
  'SOUL×LEADER':'SOUL의 가치관이 LEADER에게 나침반이 되어주는 조합.',
  'LOGIC×SPARK':'LOGIC이 SPARK의 아이디어를 정제하고 실현 가능하게 만들어줘요.',
  'LOGIC×VISION':'두 분석가의 만남. 세상의 패턴을 함께 읽어내는 파트너십.',

  'LOGIC×HARMONY':'이성과 감성의 균형을 찾아가는 성장형 커플.',

  'LOGIC×LEADER':'논리와 실행의 완벽한 팀. 목표를 향해 효율적으로 나아가요.',
  'LEADER×SPARK':'두 추진력이 만나 엄청난 에너지를 뿜어내는 조합.',
  'LEADER×VISION':'LEADER의 실행력과 VISION의 통찰이 결합된 최강 파트너십.',
  'LEADER×STEADY':'LEADER의 속도를 STEADY가 현명하게 조율해주는 관계.',

  'LEADER×HARMONY':'LEADER의 결단력과 HARMONY의 공감력이 균형을 이뤄요.',
  'LEADER×SOUL':'목표 지향과 가치 지향이 만나 서로를 깊이 있게 만들어줘요.',
  'LEADER×LOGIC':'목표와 방법론이 결합된 조합. 함께라면 못 이룰 게 없어요.',
  'LEADER×LEADER':'두 리더의 만남. 주도권 다툼도 있지만 서로를 가장 이해해요.'

let currentFilter = 'ALL';
let selectedCombo = null;

// URL 파라미터에서 자동 선택
(function(){
  const p = new URLSearchParams(window.location.search);
  const a = (p.get('a')||'').toUpperCase();
  const b = (p.get('b')||'').toUpperCase();
  if(a && b && TYPES.includes(a) && TYPES.includes(b)){
    selectedCombo = a+'×'+b;
  }
})();

function getAllCombos(){
  const list = [];
  TYPES.forEach(a => TYPES.forEach(b => list.push(a+'×'+b)));
  return list;
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(){
  const q = document.getElementById('search-input').value.trim().toUpperCase();
  const all = getAllCombos();
  const filtered = all.filter(combo => {
    const [a,b] = combo.split('×');
    if(currentFilter !== 'ALL' && a !== currentFilter && b !== currentFilter) return false;
    if(q && !combo.includes(q)) return false;
    return true;
  });

  document.getElementById('count-text').innerHTML = `총 <span>${filtered.length}</span>개 조합`;

  if(filtered.length === 0){
    document.getElementById('product-list').innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
    return;
  }

  document.getElementById('product-list').innerHTML = filtered.map(combo => {
    const [a,b] = combo.split('×');
    const desc = COMBO_DESC[combo] || '';
    const isSelected = selectedCombo === combo;
    return `<div class="product-card${isSelected?' selected':''}" id="card-${combo}" onclick="selectCombo('${combo}')">
      <div class="card-header">
        <div class="card-combo">${combo} <span style="color:var(--silver);font-weight:400;font-size:11px;">· ${TYPE_KR[a]}×${TYPE_KR[b]}</span></div>
        <div style="font-size:18px;">${isSelected?'✅':''}</div>
      </div>
      <div class="card-desc">${desc}</div>
      <div class="card-price"><span class="card-orig">19,800원</span>9,900원</div>
    </div>`;
  }).join('');

  updateBuyBar();
}

function selectCombo(combo){
  selectedCombo = (selectedCombo === combo) ? null : combo;
  renderList();
}

function updateBuyBar(){
  const bar = document.getElementById('buy-bar');
  const txt = document.getElementById('buy-bar-text');
  if(selectedCombo){
    bar.classList.add('show');
    txt.innerHTML = `<strong>${selectedCombo}</strong> 커플 리포트 · 9,900원`;
  } else {
    bar.classList.remove('show');
  }
}

function handleBuy(){
  if(!selectedCombo){ alert('유형 조합을 선택해 주세요.'); return; }
  alert('결제 시스템 준비 중입니다.\n선택: '+selectedCombo+' 커플 리포트\n\n곧 카카오페이 연동이 완료됩니다!');
}

renderList();
</script>
